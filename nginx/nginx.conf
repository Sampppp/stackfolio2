server {
    listen 80;
    server_name thisguyisreallycool.sp4k.us; # Cloudflared tunnel address
    
    # Allow large file uploads (up to 100 Megabytes)
    client_max_body_size 100M;

    # Forward frontend traffic to the new Docker Nginx container
    location / {
        proxy_pass http://localhost:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Forward API traffic to PocketBase
    location /api/ {
        proxy_pass http://localhost:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Forward Admin UI traffic to PocketBase
    location /_/ {
        proxy_pass http://localhost:8090/_/;
        proxy_set_header Host $host;
    }
}