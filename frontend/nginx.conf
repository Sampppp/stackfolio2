server {
    listen 80;
    server_name _; 
    
    # Allow large file uploads (up to 100 Megabytes)
    client_max_body_size 100M;

    # 1. Serve the React frontend (Force browsers to check for index.html updates)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # 2. Cache Vite static assets for a year
    # Vite adds unique hashes to JS/CSS files (e.g., index-BhAN8m0S.js), so they are safe to cache forever.
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 3. Cache PocketBase image thumbnails for a year
    # We intercept the specific /api/files/ route to add the cache header before passing to the backend.
    location /api/files/ {
        proxy_pass http://backend:8090/api/files/;
        add_header Cache-Control "public, max-age=31536000";
    }

    # 4. Proxy standard API requests to the backend (NO caching for dynamic database calls)
    location /api/ {
        proxy_pass http://backend:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 5. Proxy Admin UI to the backend
    location /_/ {
        proxy_pass http://backend:8090/_/;
        proxy_set_header Host $host;
    }
}
