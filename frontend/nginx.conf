http {
    # Define the cache zone. 
    # Points to the volume we mapped in docker-compose.
    # max_size=10g ensures the cache won't blow up your NAS drive.
    proxy_cache_path /var/cache/nginx/pb_thumbnails levels=1:2 keys_zone=pb_cache:10m max_size=10g inactive=30d use_temp_path=off;

    server {
        listen 80;
        server_name _; 
        
        client_max_body_size 100M;

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }

        location /assets/ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Cache PocketBase image thumbnails
        location /api/files/ {
            # Enable the cache
            proxy_cache pb_cache;
            
            # Cache valid responses (thumbnails) for 30 days
            proxy_cache_valid 200 30d;
            
            # Serve stale content if the backend is temporarily down
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

            proxy_pass http://backend:8090/api/files/;
            add_header Cache-Control "public, max-age=31536000";
            
            # Adds a header so you can verify if the cache is working (HIT vs MISS)
            add_header X-Cache-Status $upstream_cache_status;
        }

        location /api/ {
            proxy_pass http://backend:8090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /_/ {
            proxy_pass http://backend:8090/_/;
            proxy_set_header Host $host;
        }
    }
}