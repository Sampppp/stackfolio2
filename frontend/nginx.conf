# Define the user and worker processes (standard Nginx boilerplate)
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

# The events block is required in a master nginx.conf
events {
    worker_connections  1024;
}

# The single, top-level HTTP block
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    keepalive_timeout  65;

    # --- OUR NAS CACHE CONFIGURATION ---
    # This must live directly inside the http block
    proxy_cache_path /var/cache/nginx/pb_thumbnails levels=1:2 keys_zone=pb_cache:10m max_size=10g inactive=30d use_temp_path=off;

    # The Server block
    server {
        listen 80;
        server_name _; 
        
        client_max_body_size 100M;

        # 1. Serve the React frontend
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }

        # 2. Cache Vite static assets
        location /assets/ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # 3. Cache PocketBase image thumbnails
        location /api/files/ {
            proxy_cache pb_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

            proxy_pass http://backend:8090/api/files/;
            add_header Cache-Control "public, max-age=31536000";
            add_header X-Cache-Status $upstream_cache_status;
        }

        # 4. Proxy standard API requests
        location /api/ {
            proxy_pass http://backend:8090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 5. Proxy Admin UI
        location /_/ {
            proxy_pass http://backend:8090/_/;
            proxy_set_header Host $host;
        }
    }
}
