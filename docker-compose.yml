version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
      - ./photos:/pb/pb_data/storage # Maps the storage folder to your local root
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevents local node_modules from overwriting container's
    environment:
      - CHOKIDAR_USEPOLLING=true # Required for Vite HMR inside Docker
      - VITE_POCKETBASE_URL=http://localhost:8090
    networks:
      - app-network
    depends_on:
      - backend

volumes:
  pb_data:

networks:
  app-network:
    driver: bridge